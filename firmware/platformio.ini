; IR Mini V105 — 万能红外遥控器
; rboot 双分区 OTA + iOS 风格 WebUI + 空调控制 + MQTT + 传感器

[platformio]
default_envs = rom0

[env_base]
platform = espressif8266@4.2.1
board = nodemcuv2
framework = arduino
board_build.flash_mode = dout
lib_deps =
    crankyoldgit/IRremoteESP8266@^2.8.6
    knolleary/PubSubClient@^2.8
    milesburton/DallasTemperature@^3.11.0
build_flags =
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -DVTABLES_IN_FLASH
    -DMQTT_MAX_PACKET_SIZE=1024
    -I rboot
upload_speed = 115200
upload_port = COM10
monitor_speed = 115200

[env_diag_base]
extends = env_base
lib_deps =

; ROM 0 (日常编译 + USB-TTL 刷写)
[env:rom0]
extends = env_base
board_build.ldscript = ld/rboot-ROM0.ld
build_src_filter =
    +<*>
    -<diag.cpp>

; ROM 1 (OTA 更新固件)
[env:rom1]
extends = env_base
board_build.ldscript = ld/rboot-ROM1.ld
build_src_filter =
    +<*>
    -<diag.cpp>

; Factory/recovery image for direct USB-TTL flashing at 0x0.
; This runs the real application without rboot, so rboot OTA is disabled.
[env:factory]
extends = env_base
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
    ${env_base.build_flags}
    -DIRAC_RBOOT_OTA=0
build_src_filter =
    +<*>
    -<diag.cpp>
    -<rboot-api.cpp>

; ROM 0 minimal hardware diagnostic firmware.
; Builds an rboot-compatible app that only blinks GPIO2/4/12/13 and opens IR-AC-DIAG.
[env:diag]
extends = env_diag_base
board_build.ldscript = ld/rboot-ROM0.ld
build_src_filter =
    +<diag.cpp>
    -<main.cpp>
    -<rboot-api.cpp>

; Full, non-rboot hardware diagnostic image.
; Flash .pio/build/diag_factory/firmware.bin at 0x0 to verify the board can
; boot a normal ESP8266 Arduino image without rboot or OTA involved.
[env:diag_factory]
extends = env_diag_base
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
    ${env_base.build_flags}
    -DIRAC_RBOOT_OTA=0
build_src_filter =
    +<diag.cpp>
    -<main.cpp>
    -<rboot-api.cpp>
