name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build ROM0
        run: pio run -e rom0
        working-directory: firmware

      - name: Build ROM1
        run: pio run -e rom1
        working-directory: firmware

      - name: Strip eboot from firmware
        run: python prepare_flash.py both
        working-directory: firmware

      - name: Build combined flash image
        run: python ../scripts/make_combined.py
        working-directory: firmware

      - name: Stage release assets
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release
          cp firmware/flash_images/combined.bin       "release/combined-${VERSION}.bin"
          cp firmware/.pio/build/rom0/firmware.bin    "release/firmware-rom0-${VERSION}.bin"
          cp firmware/flash_images/rom1.bin           "release/firmware-rom1-${VERSION}.bin"
          cp firmware/rboot-bootloader/rboot.bin      "release/rboot-${VERSION}.bin"
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.bin
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 📦 固件下载

            | 文件 | 用途 |
            |------|------|
            | `combined-${{ github.ref_name }}.bin` | ⭐ **首选**：rboot 引导器 + ROM0 主固件合并镜像，一条 esptool 命令刷完 |
            | `firmware-rom0-${{ github.ref_name }}.bin` | 备用：含 eboot 头的完整 PlatformIO 固件 |
            | `firmware-rom1-${{ github.ref_name }}.bin` | **OTA 升级用**：已剥 eboot 头，通过 WebUI 上传 |
            | `rboot-${{ github.ref_name }}.bin` | 备用：仅 rboot 引导器，需配合 rom0 分两次刷 |

            ---

            ## 🔧 首次刷写教程（推荐 `combined.bin`）

            ### 准备
            - **USB-TTL 转换器**（CH340 / CP2102 等）
            - **杜邦线 4 根**
            - 安装 esptool：`pip install esptool`

            ### 接线

            | USB-TTL | 板子焊盘 |
            |---------|---------|
            | TX | RX |
            | RX | TX |
            | GND | GND |
            | IO0 ↔ GND | （短接进入刷写模式） |

            > ⚠️ 板子 Micro USB **仅供电**，没有数据线，必须用焊盘 TX/RX。

            ### 刷写命令

            ```bash
            # 1. 擦除整个 flash（首次必做，从旧版升级也要）
            python -m esptool --port COMx --baud 115200 --before no-reset erase-flash

            # 2. 刷入 combined.bin（rboot + ROM0 一次搞定）
            python -m esptool --port COMx --baud 115200 --before no-reset write-flash -fm dout 0x0 combined-${{ github.ref_name }}.bin
            ```

            > - 把 `COMx` 换成你的实际串口（Windows 设备管理器查看；macOS/Linux 是 `/dev/ttyUSB0`）
            > - `-fm dout` 是**必须**的，用 `dio`/`qio` 会失败

            ### 上电测试

            1. 拔掉 IO0-GND 短接线，重新上电
            2. 手机搜 WiFi：`IR-AC`，密码 `12345678`
            3. 连接后自动弹出控制页面（或访问 `http://10.1.1.1/`）

            ---

            ## 🔄 OTA 升级（已装 v2.0+，无需 USB-TTL）

            1. 浏览器打开 WebUI → **设置** → **固件更新**
            2. 选择 `firmware-rom1-${{ github.ref_name }}.bin` 上传
            3. 等待 ~30 秒，设备自动重启
            4. 新固件写入另一个分区，启动失败自动回退到旧版本（不会变砖）

            ---

            ## ✨ 本次更新

            完整更新历史见 [README.md](https://github.com/${{ github.repository }}/blob/master/README.md#版本历史)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
